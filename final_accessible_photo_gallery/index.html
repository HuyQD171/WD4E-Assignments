<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neighborhood Color Walk Gallery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="addTabFocus()">
    <main>
        <h1>Neighborhood Color Walk Gallery</h1>

        <p>
            This gallery collects six small scenes from a quiet neighborhood walk:
            morning light, public art, shared gardens, evening windows, weekend
            markets, and a calm path home.
        </p>

        <div id="image">
            Hover over or focus on an image below to display here.
        </div>

        <section class="gallery" aria-label="Photo gallery">
            <figure class="preview">
                <img src="images/photo1.svg" alt="Sunrise over colorful apartment balconies">
                <figcaption>Morning Balconies</figcaption>
            </figure>

            <figure class="preview">
                <img src="images/photo2.svg" alt="A bright mural painted on a city wall">
                <figcaption>Corner Mural</figcaption>
            </figure>

            <figure class="preview">
                <img src="images/photo3.svg" alt="Raised garden beds filled with green plants">
                <figcaption>Shared Garden</figcaption>
            </figure>

            <figure class="preview">
                <img src="images/photo4.svg" alt="Warm apartment windows glowing in the evening">
                <figcaption>Evening Windows</figcaption>
            </figure>

            <figure class="preview">
                <img src="images/photo5.svg" alt="A weekend produce stand with fruit baskets">
                <figcaption>Market Stand</figcaption>
            </figure>

            <figure class="preview">
                <img src="images/photo6.svg" alt="A curving path lined with small lanterns">
                <figcaption>Path Home</figcaption>
            </figure>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
